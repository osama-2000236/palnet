services:
  - type: web
    name: palnet-api
    runtime: docker
    region: frankfurt
    plan: starter
    dockerContext: .
    dockerfilePath: apps/api/Dockerfile
    healthCheckPath: /api/v1/health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: palnet-postgres
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: palnet-postgres
          property: directConnectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: EXPO_ACCESS_TOKEN
        sync: false

  - type: cron
    name: palnet-cron-audit-prune
    runtime: docker
    region: frankfurt
    plan: starter
    schedule: "0 3 * * *"
    dockerContext: .
    dockerfilePath: apps/api/Dockerfile
    dockerCommand: >
      sh -c 'code=$(curl -sS -o /dev/null -w "%{http_code}"
      -X POST
      -H "Authorization: Bearer $CRON_SECRET"
      "$API_URL/api/v1/admin/audit/prune") &&
      [ "$code" = "200" ] || (echo "prune failed: $code" && exit 1)'
    envVars:
      - key: CRON_SECRET
        fromService:
          type: web
          name: palnet-api
          envVarKey: CRON_SECRET
      - key: API_URL
        fromService:
          type: web
          name: palnet-api
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: palnet-postgres
    region: frankfurt
    plan: starter
    databaseName: palnet
    user: palnet
