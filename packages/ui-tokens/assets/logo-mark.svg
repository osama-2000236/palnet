<!--
  Baydar brand mark — wheat head on olive circle.
  Canonical source for: web Icon (logo), native Icon (logo), Expo
  app icon + adaptive icon + splash + favicon, web favicons.
  Hex literals here are the only tokens-of-record for the brand:
    olive  #526030  → brand-600
    cream  #f4f6ef  → brand-50
  scripts/lint-tokens.mjs ignores this folder; do not chase brand
  hex from this file into source code.
-->
