name: Mobile E2E

on:
  pull_request:
  schedule:
    - cron: "0 4 * * *"

jobs:
  smoke:
    # Skip until Maestro Cloud secrets are wired (MAESTRO_CLOUD_API_KEY,
    # MAESTRO_PROJECT_ID, MAESTRO_APP_FILE). Without them the action errors
    # immediately. Repo admin sets the secrets, removes this guard.
    if: ${{ vars.MAESTRO_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mobile-dev-inc/action-maestro-cloud@v1
        with:
          api-key: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          project-id: ${{ secrets.MAESTRO_PROJECT_ID }}
          app-file: ${{ secrets.MAESTRO_APP_FILE }}
          workspace: .maestro/smoke
          env: |
            APP_EMAIL=demo@palnet.ps
            APP_PASSWORD=Password123

  full:
    if: github.event_name == 'schedule' && vars.MAESTRO_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mobile-dev-inc/action-maestro-cloud@v1
        with:
          api-key: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          project-id: ${{ secrets.MAESTRO_PROJECT_ID }}
          app-file: ${{ secrets.MAESTRO_APP_FILE }}
          workspace: .maestro
          env: |
            APP_EMAIL=demo@palnet.ps
            APP_PASSWORD=Password123
